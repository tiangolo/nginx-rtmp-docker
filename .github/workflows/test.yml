name: Test

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
  schedule:
    # cron every week on monday
    - cron: "0 0 * * 1"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          push: false
          tags: tiangolo/nginx-rtmp:latest
          platforms: linux/amd64,linux/arm64
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg openssl
      - name: Build local image for RTMP test
        run: docker build -t nginx-rtmp-test .
      - name: Test RTMP retransmission
        run: ./scripts/test-rtmp-retransmission.sh nginx-rtmp-test
  check:
    if: always()
    needs:
    - test
    runs-on: ubuntu-latest
    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
